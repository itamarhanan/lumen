services:
  lumen-www:
    build:
      context: .
      dockerfile: ./apps/www/Dockerfile
    command: node apps/www/server.js
    networks:
      - lumen

  # Databases: Postgres, Redis, Clickhouse
  postgresdb:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redisdb:
    image: redis:8-alpine
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhousedb:
    image: clickhouse/clickhouse-server:24-alpine
    cap_add:
      - SYS_NICE
      - NET_ADMIN
      - IPC_LOCK
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/config.d/listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
    ports:
      - 8123:8123
      - 9000:9000
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    depends_on:
      - lumen-www
    networks:
      - lumen
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

# Link volumes to images for persistent data
volumes:
  postgres_data:
  redis_data:
  clickhouse_data:

networks:
  lumen:
